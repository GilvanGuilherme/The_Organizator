<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Organizador de Atividades</title>
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <!-- HOME -->
    <div class="container" id="home">
      <h1>Organizador de Atividades</h1>

      <div class="buttons">
        <button onclick="mostrarHome()">Home</button>
        <button onclick="mostrarLogin()">Login</button>
        <button onclick="mostrarCadastro()">Cadastro</button>
      </div>
    </div>

    <!-- LOGIN -->
    <div class="container" id="login" style="display: none">
      <h1>Login</h1>

      <input type="text" id="usuario" placeholder="Usuário" />
      <input type="password" id="senha" placeholder="Senha" />

      <button onclick="entrar()">Entrar</button>
      <button onclick="mostrarHome()">Voltar</button>
    </div>

    <!-- CADASTRO -->
    <div class="container" id="cadastro" style="display: none">
      <h1>Cadastro</h1>

      <input type="text" id="novoUsuario" placeholder="Novo usuário" />
      <input type="password" id="novaSenha" placeholder="Nova senha" />

      <button onclick="cadastrar()">Cadastrar</button>
      <button onclick="mostrarHome()">Voltar</button>
    </div>

    <!-- APP -->
    <div class="container" id="app" style="display: none">
      <h1>Organizador</h1>

      <input type="text" id="inputTarefa" placeholder="Digite uma atividade" />

      <button onclick="adicionar()">Adicionar</button>
      <button onclick="listar()">Listar</button>
      <button onclick="limpar()">Excluir</button>

      <ul id="lista"></ul>

      <button onclick="mostrarHome()">Sair</button>
    </div>
    <script src="scripts/api.js"></script>
    <script src="scripts/ui.js"></script>
    <script src="scripts/app.js"></script>
  </body>
</html>
